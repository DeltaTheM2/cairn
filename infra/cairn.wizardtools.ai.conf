# Cairn — host Nginx site config.
#
# Install:
#   sudo cp infra/cairn.wizardtools.ai.conf /etc/nginx/sites-available/cairn.wizardtools.ai.conf
#   sudo ln -s /etc/nginx/sites-available/cairn.wizardtools.ai.conf \
#              /etc/nginx/sites-enabled/cairn.wizardtools.ai.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then provision the cert (Let's Encrypt via the nginx plugin — it'll edit
# this file in place to add the TLS bits and an HTTP -> HTTPS redirect):
#   sudo certbot --nginx -d cairn.wizardtools.ai
#
# DNS prereq: cairn.wizardtools.ai must resolve to this server's public IP.
#
# This file only defines one server block. It does not touch any other site.

upstream cairn_app { server 127.0.0.1:13002; keepalive 32; }

server {
    server_name cairn.wizardtools.ai;

    # Wizard answer payloads + synthesized markdown are small; cap modestly.
    client_max_body_size 25m;
    client_body_timeout  60s;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options        SAMEORIGIN always;
    add_header Referrer-Policy        strict-origin-when-cross-origin always;

    # Synthesizer streams Server-Sent Events; keep buffering off and the
    # connection alive long enough for slow models.
    location /api/docs/ {
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_pass         http://cairn_app;
    }

    # Everything else -> Next.js (loopback). Upgrade headers cover HMR
    # in dev and any future websocket use.
    location / {
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_pass         http://cairn_app;
    }

    listen 80;
    listen [::]:80;
}
